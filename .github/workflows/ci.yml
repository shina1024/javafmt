name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked

  reference:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Download pinned google-java-format
        run: |
          VERSION="$(tr -d ' \n\r' < tools/gjf/version.txt)"
          if [ -z "$VERSION" ] || [ "$VERSION" = "latest" ]; then
            echo "tools/gjf/version.txt must contain a resolved version"
            exit 1
          fi
          mkdir -p tools/gjf
          curl -fsSL -o "tools/gjf/google-java-format-${VERSION}-all-deps.jar" \
            "https://github.com/google/google-java-format/releases/download/v${VERSION}/google-java-format-${VERSION}-all-deps.jar"
      - name: Reference diff
        run: |
          cargo run -p gjf-reference -- \
            --runs 3 \
            --max-mismatches 0 \
            --min-gjf-over-javafmt 1.10 \
            --report target/gjf-report.json \
            fixtures/java
      - name: Upload reference report
        uses: actions/upload-artifact@v4
        with:
          name: gjf-reference-report
          path: target/gjf-report.json
